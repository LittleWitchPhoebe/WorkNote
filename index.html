<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项列表 - JavaScript 练习</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 我的待办事项</h1>
            <p class="subtitle">用原生 JavaScript 实现</p>
        </header>

        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                name="todoInput"
                placeholder="输入待办事项..."
                autocomplete="off"
            >
            <select id="prioritySelect" class="priority-select">
                <option value="high">高</option>
                <option value="medium">中</option>
                <option value="low" selected>低</option>
            </select>
            <button id="addBtn" class="btn btn-primary">添加</button>
        </div>
        <!-- search-section -->
        <div class="search-section">
            <input
                type="search"
                id="searchInput"
                name="searchInput"
                placeholder="搜索待办事项。。。"
                autocomplete="off"
            >
        </div>


        <div class="todo-list" id="todoList">
            <!-- 待办事项将动态添加到这里 -->
        </div>

        <div class="stats" id="stats">
            <span>总计: <strong id="totalCount">0</strong></span>
            <span>已完成: <strong id="completedCount">0</strong></span>
            <button id="clearCompletedBtn" class="btn btn-clear">清除已完成</button>
        </div>
    </div>
    
    <!-- toast 提示框应该放在 container 外面，避免被清空 -->
    <div id="toast" class="toast">删除成功</div>

    <script src="script.js"></script>
</body>
</html>
