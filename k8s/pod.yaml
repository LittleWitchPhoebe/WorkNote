apiVersion: v1
kind: Pod
metadata:
  name: todo-list
  labels:
    app: todo-list
spec:
  # 使用本地镜像时：image 填 todo-list:v1，imagePullPolicy: Never
  # 使用远程仓库时：image 填下方其一，imagePullPolicy: IfNotPresent
  containers:
    - name: todo-list
      image: todo-list:v1
      imagePullPolicy: Never
      # 若推送到 Docker Hub：image: 你的用户名/todo-list:v1  imagePullPolicy: IfNotPresent
      # 若推送到阿里云：   image: registry.cn-hangzhou.aliyuncs.com/命名空间/todo-list:v1  imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 80
          name: http
  restartPolicy: Always
